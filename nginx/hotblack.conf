server {
    listen 80;
    server_name hotblackcoffee.duckdns.org 45.141.76.195;
    return 301 https://hotblackcoffee.duckdns.org$request_uri;
}

server {
    listen 443 ssl;
    server_name hotblackcoffee.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/hotblackcoffee.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotblackcoffee.duckdns.org/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
